# Trace: arch/vnv/traceability-matrix.md §3 (NFR-CI-001), §7 (cicd RULE)
# CI order: build → unit → integration → system. Each downstream job
# `needs:` the previous, so a failure short-circuits the pipeline.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ python3

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} -DRVC_BUILD_TESTS=ON

      - name: Build core + tests + simulator
        run: cmake --build build --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rvc-build
          path: |
            build/rvc_sim
            build/tests/rvc_unit_tests
            build/tests/rvc_integration_tests
          if-no-files-found: error
          retention-days: 7

  unit_tests:
    name: unit_tests (GTest)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rvc-build
          path: build

      - name: Make tests executable
        run: chmod +x build/tests/rvc_unit_tests build/tests/rvc_integration_tests build/rvc_sim || true

      - name: Run unit tests
        run: build/tests/rvc_unit_tests --gtest_color=yes

  integration_tests:
    name: integration_tests (GTest)
    needs: [unit_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build g++

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rvc-build
          path: build

      - name: Make tests executable
        run: chmod +x build/tests/rvc_unit_tests build/tests/rvc_integration_tests build/rvc_sim || true

      - name: Run integration tests
        run: build/tests/rvc_integration_tests --gtest_color=yes

  system_tests:
    name: system_tests (simulator, non-GTest)
    needs: [integration_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rvc-build
          path: build

      - name: Make sim executable
        run: chmod +x build/rvc_sim

      - name: Run system test runner (--check-determinism)
        run: |
          python system_tests/run_all.py --sim build/rvc_sim --check-determinism

      - name: Upload system test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-logs
          path: |
            system_tests/maps
          retention-days: 7
